apiVersion: batch/v1
kind: Job
metadata:
  name: backend-migrations
  namespace: ${KUBE_NAMESPACE}

spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        app: backend
    spec:
      restartPolicy: OnFailure

      imagePullSecrets:
        - name: registry-secret
      # INIT CONTAINER — waits for SQL Server
      initContainers:
        - name: wait-for-db
          image: mcr.microsoft.com/mssql-tools:latest
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for SQL Server to be ready..."
              until /opt/mssql-tools/bin/sqlcmd -S sts-db-service -U sa -P "$DB_PASSWORD" -Q "SELECT 1" > /dev/null 2>&1; do
                echo "SQL Server not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "SQL Server is ready!"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
      containers:
        - name: migrate
          image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent
          command: ["dotnet", "backend.dll", "--migrate"]
          env:
            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ConnectionString
            - name: SeedDemoData
              value: "true"