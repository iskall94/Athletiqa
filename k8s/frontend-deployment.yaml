apiVersion: apps/v1
kind: Deployment

metadata:
  name: frontend
  namespace: ${KUBE_NAMESPACE}

  labels:
    app: frontend

spec:
  replicas: 2

  selector:
    matchLabels:
      app: frontend

  strategy:
    type: RollingUpdate

    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 1

  template:
    metadata:
      labels:
        app: frontend

    spec:

      imagePullSecrets:
        - name: registry-secret

      securityContext:
        seccompProfile:
          type: RuntimeDefault

      containers:
        - name: frontend

          image: ${CI_REGISTRY_IMAGE}/frontend:${IMAGE_TAG}

          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 5173

          env:
            - name: NODE_ENV
              value: "production"

          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"

            limits:
              memory: "1Gi"
              cpu: "1000m"

          readinessProbe:
            httpGet:
              path: /
              port: 5173

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5

          livenessProbe:
            httpGet:
              path: /
              port: 5173

            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5

          securityContext:
            allowPrivilegeEscalation: false

            capabilities:
              drop:
                - ALL

            readOnlyRootFilesystem: false

            runAsNonRoot: true
            runAsUser: 1000