apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: backend-monitor
  namespace: ${KUBE_NAMESPACE}
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      svc: backend-service
  endpoints:
    - port: http
      path: /metrics
      interval: 15s
      honorLabels: true
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: backend-rules
  namespace: ${KUBE_NAMESPACE}
  labels:
    release: monitoring
spec:
  groups:
    - name: backend.rules
      rules:
        - alert: BackendHighErrorRate
          expr: |
            sum(rate(http_requests_total{namespace="${KUBE_NAMESPACE}",status_code=~"5..",endpoint!="/metrics"}[5m]))
              /
            sum(rate(http_requests_total{namespace="${KUBE_NAMESPACE}",endpoint!="/metrics"}[5m]))
              > 0.05
          for: 5m
          labels:
            severity: warning
          annotations:
            summary: "backend 5xx rate above 5% (5m)"
            description: "More than 5% of requests are returning 5xx for the last 5 minutes."
        - alert: BackendNoTraffic
          expr: |
            sum(rate(http_requests_total{namespace="${KUBE_NAMESPACE}",endpoint!="/metrics"}[10m])) == 0
          for: 15m
          labels:
            severity: info
          annotations:
            summary: "backend has received no traffic for 15m"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gr9-backend-dashboard
  namespace: ${KUBE_NAMESPACE}
  labels:
    grafana_dashboard: "1"
data:
  Ninetech-Backend.json: |
    {
      "title": "Ninetech - Backend",
      "uid": "ninetech-backend",
      "schemaVersion": 39,
      "time": { "from": "now-1h", "to": "now" },
      "refresh": "30s",
      "tags": ["chas-academy", "doe25", "ninetech", "doe25-group-9"],
      "panels": [
        {
          "id": 1,
          "type": "timeseries",
          "title": "Request rate (req/s) by endpoint",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum by (endpoint) (rate(http_requests_total{namespace=\"${KUBE_NAMESPACE}\",endpoint!=\"/metrics\"}[1m]))",
              "legendFormat": "{{endpoint}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "reqps" } }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Error rate (5xx, share of total)",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "(sum(rate(http_requests_total{namespace=\"${KUBE_NAMESPACE}\",status_code=~\"5..\",endpoint!=\"/metrics\"}[5m])) or vector(0)) / clamp_min(sum(rate(http_requests_total{namespace=\"${KUBE_NAMESPACE}\",endpoint!=\"/metrics\"}[5m])), 1)",
              "legendFormat": "5xx ratio",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "percentunit", "min": 0 } }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Latency p95 (s) by endpoint",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum by (endpoint, le) (rate(http_request_duration_seconds_bucket{namespace=\"${KUBE_NAMESPACE}\",endpoint!=\"/metrics\"}[5m])))",
              "legendFormat": "{{endpoint}}",
              "refId": "A"
            }
          ],
          "fieldConfig": { "defaults": { "unit": "s" } }
        },
        {
          "id": 4,
          "type": "stat",
          "title": "Requests last 5m by status_code",
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            {
              "expr": "sum by (status_code) (increase(http_requests_total{namespace=\"${KUBE_NAMESPACE}\",endpoint!=\"/metrics\"}[5m]))",
              "legendFormat": "{{status_code}}",
              "refId": "A"
            }
          ]
        }
      ]
    }