apiVersion: apps/v1
kind: Deployment

metadata:
  name: backend-deployment
  namespace: ${KUBE_NAMESPACE}
  labels:
    app: backend

spec:
  replicas: 2
  revisionHistoryLimit: 5

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"

    spec:
      imagePullSecrets:
        - name: registry-secret

      initContainers:
        - name: wait-for-db
          image: mcr.microsoft.com/mssql-tools:latest
          imagePullPolicy: IfNotPresent
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for SQL Server to be ready..."
              SQLCMD=$(which sqlcmd 2>/dev/null \
                || ls /opt/mssql-tools18/bin/sqlcmd 2>/dev/null \
                || ls /opt/mssql-tools/bin/sqlcmd 2>/dev/null)
              until $SQLCMD -S sts-db-service -U sa -P "$DB_PASSWORD" -Q "SELECT 1" > /dev/null 2>&1; do
                echo "SQL Server not ready yet, retrying in 3s..."
                sleep 3
              done
              echo "SQL Server ready"
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL

      containers:
        - name: backend
          image: ${CI_REGISTRY_IMAGE}/backend:${IMAGE_TAG}
          imagePullPolicy: IfNotPresent

          ports:
            - containerPort: 8080

          env:
            # ASP.NET Core
            - name: ASPNETCORE_ENVIRONMENT
              value: "Production"

            - name: ASPNETCORE_URLS
              value: "http://+:8080"

            # Email (Mailpit)
            - name: EmailSettings__Host
              value: "mailpit-service"

            - name: EmailSettings__Port
              value: "1025"

            # Database
            - name: DB_HOST
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_HOST

            - name: DB_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_NAME

            - name: DB_USER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_USER

            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: DB_PASSWORD

            - name: ConnectionStrings__DefaultConnection
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: ConnectionString

            # Stripe
            - name: STRIPE_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: STRIPE_SECRET_KEY

            - name: STRIPE_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: STRIPE_WEBHOOK_SECRET

            # Cloudinary
            - name: CLOUDINARY_CLOUD_NAME
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLOUDINARY_CLOUD_NAME

            - name: CLOUDINARY_API_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLOUDINARY_API_KEY

            - name: CLOUDINARY_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLOUDINARY_API_SECRET

            - name: CLOUDINARY_ROOT_FOLDER
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: CLOUDINARY_ROOT_FOLDER

            # CORS
            - name: AllowedOrigins
              value: "https://${CI_COMMIT_REF_SLUG}.cc.k3s.chas-lab.dev,https://athletiqa.labb.k3s.chas-lab.dev,https://athletiqa.cc.k3s.chas-lab.dev,http://localhost:5173,http://localhost:3000"

          resources:
            requests:
              memory: "256Mi"
              cpu: "200m"
            limits:
              memory: "512Mi"
              cpu: "1000m"

          startupProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 30

          livenessProbe:
            httpGet:
              path: /health/live
              port: 8080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8080
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 10

          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
