collector_name: mssql_standard

metrics:

- metric_name: mssql_connections
  type: gauge
  help: "Number of SQL Server connections"
  values: [current, active, blocked]
  query: |
    SELECT
      (SELECT COUNT(*) FROM sys.dm_exec_sessions WHERE is_user_process = 1) AS current,
      (SELECT COUNT(*) FROM sys.dm_exec_sessions WHERE is_user_process = 1 AND status = 'running') AS active,
      (SELECT COUNT(*) FROM sys.dm_exec_requests WHERE blocking_session_id != 0) AS blocked

- metric_name: mssql_deadlocks_total
  type: counter
  help: "Total number of deadlocks since SQL Server started"
  values: [cntr_value]
  query: |
    SELECT cntr_value
    FROM sys.dm_os_performance_counters
    WHERE counter_name = 'Number of Deadlocks/sec'
      AND instance_name = '_Total'

- metric_name: mssql_batch_requests_total
  type: counter
  help: "Total number of batch requests processed since SQL Server started"
  values: [cntr_value]
  query: |
    SELECT cntr_value
    FROM sys.dm_os_performance_counters
    WHERE counter_name = 'Batch Requests/sec'
      AND object_name LIKE '%SQL Statistics%'

  
- metric_name: mssql_sql_compilations_total
  type: counter
  help: "Total SQL compilations since SQL Server started"
  values: [cntr_value]
  query: |
    SELECT cntr_value
    FROM sys.dm_os_performance_counters
    WHERE counter_name = 'SQL Compilations/sec'
      AND object_name LIKE '%SQL Statistics%'

- metric_name: mssql_sql_recompilations_total
  type: counter
  help: "Total SQL re-compilations since SQL Server started"
  values: [cntr_value]
  query: |
    SELECT cntr_value
    FROM sys.dm_os_performance_counters
    WHERE counter_name = 'SQL Re-Compilations/sec'
      AND object_name LIKE '%SQL Statistics%'

- metric_name: mssql_buffer_cache_hit_ratio
  type: gauge
  help: "Buffer cache hit ratio ratio percentage (higher is better, target > 95)"
  values: [ratio]
  query: |
    SELECT
      CAST(
        a.cntr_value * 100.0 / NULLIF(b.cntr_value, 0)
      AS DECIMAL(5, 2)) AS ratio
    FROM sys.dm_os_performance_counters a
    JOIN sys.dm_os_performance_counters b
      ON b.counter_name = 'Buffer cache hit ratio base'
      AND b.object_name = a.object_name
    WHERE a.counter_name = 'Buffer cache hit ratio'
      AND a.object_name LIKE '%Buffer Manager%'

- metric_name: mssql_page_life_expectancy_seconds
  type: gauge
  help: "Page life expectancy in seconds (higher is better, target > 300)"
  values: [cntr_value]
  query: |
    SELECT cntr_value
    FROM sys.dm_os_performance_counters
    WHERE counter_name = 'Page life expectancy'
      AND object_name LIKE '%Buffer Manager%'

- metric_name: mssql_lock_timeouts_total
  type: counter
  help: "Total number of lock timeouts since SQL Server started"
  values: [cntr_value]
  query: |
    SELECT cntr_value
    FROM sys.dm_os_performance_counters
    WHERE counter_name = 'Lock Timeouts/sec'
      AND instance_name = '_Total'

- metric_name: mssql_lock_waits_total
  type: counter
  help: "Total number of lock waits since SQL Server started"
  values: [cntr_value]
  query: |
    SELECT cntr_value
    FROM sys.dm_os_performance_counters
    WHERE counter_name = 'Lock Waits/sec'
      AND instance_name = '_Total'

- metric_name: mssql_database_filesize_bytes
  type: gauge
  help: "Size of each database file in bytes"
  labels: [database state, file_type]
  values: [size_bytes]
  query: |
    SELECT
      DB_NAME(database_id) AS database,
      state_desc AS state,
      type_desc AS file_type,
      CAST(size AS BIGINT) * 8 * 1024 AS size_bytes
    FROM sys.master_files
    WHERE state = 0 -- ONLINE only

- metric_name: mssql_os_memory_bytes
  type: gauge
  help: "Total memory used by SQL Server in bytes"
  labels: [type]
  values: [value_bytes]
  query: |
    SELECT
      'physical_memory_in_use' AS type,
      physical_memory_in_use_kb * 1024 AS value_bytes
    FROM sys.dm_os_process_memory
    UNION ALL
    SELECT
      'virtual_address_space_committed' AS type,
      virtual_address_space_committed_kb * 1024 AS value_bytes
    FROM sys.dm_os_process_memory

- metric_name: mssql_active_transactions
  type: gauge
  help: "Number of active transactions"
  values: [cntr_value]
  query: |
    SELECT cntr_value
    FROM sys.dm_os_performance_counters
    WHERE counter_name = 'Active Transactions'
      AND instance_name = '_Total'