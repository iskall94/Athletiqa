stages:
  - build
  - test
  - docker
  - deploy
  - verify
  - cleanup

variables:
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHORT_SHA
  IMAGE_LATEST: $CI_REGISTRY_IMAGE:latest
  REGISTRY_TAG: $CI_COMMIT_SHORT_SHA

default:
  tags:
    - ninetech

test_backend:
  stage: test
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet restore backend/backend.csproj
    - dotnet test backend/backend.csproj --no-restore
  rules:
    - if: $CI_MERGE_REQUEST_ID
      changes: 
        - backend/**/*
    - if: $CI_COMMIT_BRANCH
      changes:
        - backend/**/*

build_backend:
  stage: build
  image: mcr.microsoft.com/dotnet/sdk:10.0
  script:
    - dotnet restore backend/backend.csproj
    - dotnet build backend/backend.csproj --no-restore
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_MERGE_REQUEST_ID

build_frontend:
  stage: build
  image: node:22
  script:
    - cd frontend
    - npm ci
    - npm run build
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_MERGE_REQUEST_ID

docker_build_utils:
  stage: docker
  image: docker:29-cli
  tags:
    - docker
  script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker buildx build -f deploy/Dockerfile-utilities -t $CI_REGISTRY_IMAGE/utilities:latest --push deploy/
  rules:
    - changes: 
        - deploy/Dockerfile-utilities
      if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_MERGE_REQUEST_ID

docker_build_backend:
  stage: docker
  image: docker:29-cli
  tags:
    - docker
  script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker buildx build
        -f backend/Dockerfile
        -t $CI_REGISTRY_IMAGE/backend:$REGISTRY_TAG
        -t $CI_REGISTRY_IMAGE/backend:latest
        --cache-from=$CI_REGISTRY_IMAGE/backend:latest
        --push .
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_MERGE_REQUEST_ID
  needs:
    - job: build_backend
    - job: test_backend
      optional: true

docker_build_frontend:
  stage: docker
  image: docker:29-cli
  tags:
    - docker
  script:
    - docker info
    - echo "$CI_REGISTRY_PASSWORD" | docker login "$CI_REGISTRY" -u "$CI_REGISTRY_USER" --password-stdin
    - docker buildx build
        -f frontend/Dockerfile
        -t $CI_REGISTRY_IMAGE/frontend:$REGISTRY_TAG
        -t $CI_REGISTRY_IMAGE/frontend:latest
        --cache-from=$CI_REGISTRY_IMAGE/frontend:latest
        --push .
  rules:
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH || $CI_MERGE_REQUEST_ID
  needs:
    - job: build_frontend

deploy_k8s:
  stage: deploy
  image: ${CI_REGISTRY_IMAGE}/utilities:latest
  environment:
    name: k8s/$CI_COMMIT_REF_SLUG
    url: https://$CI_COMMIT_REF_SLUG.cc.k3s.chas-lab.dev
    on_stop: stop_review_k8s
  before_script:
    - mkdir -p ~/.kube
    - cp "$KUBECONFIG_CONTENT" ~/.kube/config
    - chmod 600 ~/.kube/config
    - |
      kubectl create secret generic app-secrets \
        --from-literal=STRIPE_SECRET_KEY="$STRIPE_SECRET_KEY" \
        --from-literal=STRIPE_WEBHOOK_SECRET="$STRIPE_WEBHOOK_SECRET" \
        --from-literal=CLOUDINARY_CLOUD_NAME="$CLOUDINARY_CLOUD_NAME" \
        --from-literal=CLOUDINARY_API_KEY="$CLOUDINARY_API_KEY" \
        --from-literal=CLOUDINARY_API_SECRET="$CLOUDINARY_API_SECRET" \
        --from-literal=CLOUDINARY_ROOT_FOLDER="$CLOUDINARY_ROOT_FOLDER" \
        --from-literal=DB_HOST="$DB_HOST" \
        --from-literal=DB_NAME="$DB_NAME" \
        --from-literal=DB_USER="$DB_USER" \
        --from-literal=DB_PASSWORD="$DB_PASSWORD" \
        --from-literal=ConnectionString="Server=$DB_HOST;Database=$DB_NAME;User=$DB_USER;Password=$DB_PASSWORD;TrustServerCertificate=True" \
        --namespace="$KUBE_NAMESPACE" \
        --dry-run=client -o yaml | kubectl apply -f -
    - |
      kubectl create secret docker-registry registry-secret \
        --docker-server="$CI_REGISTRY" \
        --docker-username="$CI_REGISTRY_USER" \
        --docker-password="$CI_REGISTRY_PASSWORD" \
        --docker-email="$CI_REGISTRY_EMAIL" \
        --namespace="$KUBE_NAMESPACE" \
        --dry-run=client -o yaml | kubectl apply -f -
  script:
    - kubectl delete job backend-migrations -n $KUBE_NAMESPACE --ignore-not-found
    - python3 deploy/deploy-k8s.py
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  needs:
    - job: docker_build_backend
    - job: docker_build_frontend
    - job: docker_build_utils
      optional: true
      
url_tls_health_test:
  stage: verify
  image: curlimages/curl:latest
  variables:
    APP_URL: "https://$CI_COMMIT_REF_SLUG.cc.k3s.chas-lab.dev"
  script:
    - echo "Health testing deployment at $APP_URL"
    - echo ""
    # 1. Frontend root should return 200
    - echo "[1/3] Checking frontend root..."
    - |
      STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 --retry 5 --retry-delay 10 --retry-connrefused "$APP_URL/")
      if [ "$STATUS" != "200" ] && [ "$STATUS" != "304" ]; then
        echo "FAIL: Frontend returned $STATUS (expected 200 or 304)"
        exit 1
      fi
      echo "OK: Frontend returned $STATUS"
    # 2. Backend should be reachable via /api prefix (404 from backend = route is wired up)
    - echo "[2/3] Checking backend /api routing..."
    - |
      STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 30 "$APP_URL/api/this-route-does-not-exist")
      if [ "$STATUS" = "504" ] || [ "$STATUS" = "502" ] || [ "$STATUS" = "503" ]; then
        echo "FAIL: Backend unreachable, gateway returned $STATUS"
        exit 1
      fi
      echo "OK: Backend reachable, status $STATUS (404 means routing works)"
    # 3. TLS certificate should be valid
    - echo "[3/3] Checking TLS certificate..."
    - |
      if ! curl -sSf --max-time 10 -o /dev/null "$APP_URL/"; then
        echo "FAIL: TLS handshake or HTTPS request failed"
        exit 1
      fi
      echo "OK: TLS cert valid"
    - echo ""
    - echo "All health checks passed for $APP_URL"
  rules:
    - if: $CI_MERGE_REQUEST_ID
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
  needs:
    - job: deploy_k8s

stop_review_k8s:
  stage: cleanup
  image:
    name: bitnami/kubectl:latest
    entrypoint: [""]
  environment:
    name: k8s/$CI_COMMIT_REF_SLUG
    action: stop
  before_script:
    - mkdir -p ~/.kube
    - cp "$KUBECONFIG_CONTENT" ~/.kube/config
    - chmod 600 ~/.kube/config
  script:
    # The namespace is pre-created by the lab and cannot be recreated — delete resources only.
    # pvc removes the database volume.
    - kubectl delete deployment,statefulset,daemonset,service,ingress,secret,configmap,horizontalpodautoscaler,networkpolicy,job -n $KUBE_NAMESPACE --all --ignore-not-found=true
    - kubectl delete servicemonitor,prometheusrule -n $KUBE_NAMESPACE --all --ignore-not-found=true 2>/dev/null || true
  rules:
    - if: $CI_MERGE_REQUEST_ID
      when: manual
    - if: $CI_COMMIT_REF_NAME == $CI_DEFAULT_BRANCH
      when: manual